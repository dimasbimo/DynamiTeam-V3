<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0f1c" />
  <title>Offline — DynamiTeam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(1200px 600px at 50% -10%, #12182b 0%, #070a12 60%);
      color: #e2e8f0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .card {
      max-width: 360px; border: 1px solid rgba(245,196,81,0.18);
      background: rgba(14,20,36,0.6); border-radius: 20px; padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { width: 72px; height: 72px; object-fit: contain; margin: 0 auto 18px; display: block; opacity: 0.95; }
    h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 10px; letter-spacing: 0.3px; }
    p { font-size: 14px; line-height: 1.6; color: #94a3b8; margin-bottom: 22px; }
    button {
      font-size: 14px; font-weight: 600; color: #0b0f1c; cursor: pointer; border: 0;
      padding: 10px 22px; border-radius: 12px;
      background: linear-gradient(180deg, #f5c451, #d9a028);
    }
    .brand { margin-top: 18px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo-icon.png" alt="DynamiTeam" class="logo" />
    <h1>Kamu sedang offline</h1>
    <p>Sambungkan internet untuk melihat data terbaru DynamiTeam.</p>
    <button onclick="location.reload()">Coba Lagi</button>
    <div class="brand">DynamiTeam</div>
  </div>
</body>
</html>
